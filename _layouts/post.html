---
layout: blog
---

<article class="post-article">
  <a class="back-link" href="{{ site.baseurl }}/writing/">All writing</a>
  <header class="post-header">
    <p class="eyebrow">Writing</p>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %e, %Y" }}{% if page.author %} · {{ page.author }}{% endif %}</p>
  </header>

  <div class="prose">
    {{ content }}
  </div>

  {% include disqus.html %}
</article>
