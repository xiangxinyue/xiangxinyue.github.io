<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.name }}</title>
    {% include meta.html %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link href="//netdna.bootstrapcdn.com/font-awesome/3.2.1/css/font-awesome.css" rel="stylesheet">
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
  </head>
  <body class="{% if page.body_class %}{{ page.body_class }}{% endif %}">
    {% assign current_url = page.url | default: "/" %}
    <div class="site-shell">
      <header class="site-header">
        <div class="container site-header-inner">
          <a class="brand" href="{{ site.baseurl }}/">
            <span class="brand-mark">XX</span>
            <span class="brand-copy">
              <strong>{{ site.name }}</strong>
              <span>{{ site.description }}</span>
            </span>
          </a>
          <nav class="site-nav" aria-label="Primary">
            <a href="{{ site.baseurl }}/" class="{% if current_url == '/' %}is-active{% endif %}">Home</a>
            <a href="{{ site.baseurl }}/projects/" class="{% if current_url contains '/projects/' %}is-active{% endif %}">Projects</a>
            <a href="{{ site.baseurl }}/about/" class="{% if current_url contains '/about/' %}is-active{% endif %}">About</a>
          </nav>
          <a class="secret-object-trigger secret-object-trigger-header" href="{{ site.baseurl }}/more-about-me/" data-secret-slot="header" aria-label="Open more about me"></a>
        </div>
      </header>

      <main class="site-main">
        <div class="container">
          {{ content }}
        </div>
      </main>

      <footer class="site-footer">
        <div class="container footer-inner">
          <div>
            <p class="footer-label">Elsewhere</p>
            <div class="footer-icons">
              {% include svg-icons.html %}
            </div>
          </div>
          <div class="footer-note">
            <p>I left a secret page somewhere on this site. I think you can find it! ;)</p>
          </div>
          <div class="footer-secret-objects" aria-label="More about me">
            <a class="secret-object-trigger" href="{{ site.baseurl }}/more-about-me/" data-secret-slot="footer-one" aria-label="Open more about me"></a>
            <a class="secret-object-trigger" href="{{ site.baseurl }}/more-about-me/" data-secret-slot="footer-two" aria-label="Open more about me"></a>
          </div>
        </div>
      </footer>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var slots = Array.prototype.slice.call(document.querySelectorAll("[data-secret-slot]"));
        var templateIds = [
          "secret-object-labrador",
          "secret-object-siamese",
          "secret-object-orange-cat",
          "secret-object-mercedes",
          "secret-object-fuji",
          "secret-object-ring",
          "secret-object-knife"
        ];

        function randomId(excludeId) {
          var candidates = templateIds.filter(function (id) {
            return id !== excludeId;
          });

          return candidates[Math.floor(Math.random() * candidates.length)];
        }

        function renderSlot(slot, templateId) {
          var template = document.getElementById(templateId);
          if (!template) return;

          slot.innerHTML = "";
          slot.appendChild(template.content.cloneNode(true));
          slot.dataset.objectId = templateId;
          slot.title = template.dataset.label + " \u00b7 more about me";
          slot.style.setProperty("--delay", (Math.random() * 7).toFixed(2) + "s");
        }

        slots.forEach(function (slot) {
          renderSlot(slot, randomId(""));
        });

        window.setInterval(function () {
          slots.forEach(function (slot) {
            slot.classList.add("is-swapping");
            window.setTimeout(function () {
              renderSlot(slot, randomId(slot.dataset.objectId));
              slot.classList.remove("is-swapping");
            }, 220);
          });
        }, 12000);
      });
    </script>
    {% include analytics.html %}
  </body>
</html>
